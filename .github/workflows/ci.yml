name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:

  # Client Build
  client:
    name: Client Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build client
        run: npm run build

  # Server Test
  server:
    name: Server Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build server
        run: npm run build
      
  # Playwright E2E Tests
  playwright:
    name: Playwright E2E Tests
    needs:
      - client
      - server
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            test/package-lock.json
            server/package-lock.json
            client/package-lock.json

      # Install Playwright project
      - name: Install test dependencies
        run: npm ci
        working-directory: test

      # Needed because Playwright webServer starts backend
      - name: Install server dependencies
        run: npm ci
        working-directory: server

      # Needed because Playwright webServer starts frontend
      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: test

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: test