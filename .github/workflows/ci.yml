name: CI Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master


jobs:

  # ==========================
  # Client Build
  # ==========================
  client:
    name: Client Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: client

    env:
      VITE_LOCAL_API_URL: ${{ secrets.VITE_LOCAL_API_URL }}
      VITE_USD_ID: ${{ secrets.VITE_USD_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: client/package-lock.json


      - name: Install dependencies
        run: npm ci


      - name: Create client env
        run: |
          echo "VITE_LOCAL_API_URL=${{ secrets.VITE_LOCAL_API_URL }}" > .env
          echo "VITE_USD_ID=${{ secrets.VITE_USD_ID }}" >> .env


      - name: Debug client env
        run: cat .env


      - name: Build client
        run: npm run build



  # ==========================
  # Server Build Check
  # ==========================
  server:
    name: Server Build Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server


    steps:
      - name: Checkout code
        uses: actions/checkout@v4


      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: server/package-lock.json


      - name: Install dependencies
        run: npm ci


      - name: Build server
        run: npm run build



  # ==========================
  # Playwright E2E Tests
  # ==========================
  playwright:
    name: Playwright E2E Tests

    needs:
      - client
      - server

    runs-on: ubuntu-latest

    timeout-minutes: 60


    env:
      # Backend
      CLIENT_URL: ${{ secrets.CLIENT_URL }}
      CLOUDINARY_KEY: ${{ secrets.CLOUDINARY_KEY }}
      CLOUDINARY_NAME: ${{ secrets.CLOUDINARY_NAME }}
      CLOUDINARY_SECRET: ${{ secrets.CLOUDINARY_SECRET }}

      JWT_ACCESS_TOKEN: ${{ secrets.JWT_ACCESS_TOKEN }}
      JWT_REFRESH_TOKEN: ${{ secrets.JWT_REFRESH_TOKEN }}

      MONGODB_URI: ${{ secrets.MONGODB_URI }}

      PORT: ${{ secrets.PORT }}

      REDIS_HOST: ${{ secrets.REDIS_HOST }}
      REDIS_PORT: ${{ secrets.REDIS_PORT }}
      REDIS_USERNAME: ${{ secrets.REDIS_USERNAME }}
      REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      RESEND_KEY: ${{ secrets.RESEND_KEY }}

      SUPER_ADMIN_EMAIL: ${{ secrets.SUPER_ADMIN_EMAIL }}
      SUPER_ADMIN_PASSWORD: ${{ secrets.SUPER_ADMIN_PASSWORD }}


      # Frontend
      VITE_LOCAL_API_URL: ${{ secrets.VITE_LOCAL_API_URL }}
      VITE_USD_ID: ${{ secrets.VITE_USD_ID }}



    steps:

      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: |
            test/package-lock.json
            server/package-lock.json
            client/package-lock.json



      # --------------------------
      # Install dependencies
      # --------------------------

      - name: Install test dependencies
        run: npm ci
        working-directory: test


      - name: Install server dependencies
        run: npm ci
        working-directory: server


      - name: Install client dependencies
        run: npm ci
        working-directory: client



      # --------------------------
      # Create frontend env
      # --------------------------

      - name: Create client env
        run: |
          echo "VITE_LOCAL_API_URL=${{ secrets.VITE_LOCAL_API_URL }}" > .env
          echo "VITE_USD_ID=${{ secrets.VITE_USD_ID }}" >> .env
        working-directory: client


      - name: Debug client env
        run: cat .env
        working-directory: client



      # --------------------------
      # Playwright
      # --------------------------

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        working-directory: test


      - name: Run Playwright tests
        run: npx playwright test
        working-directory: test



      # --------------------------
      # Upload Report
      # --------------------------

      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/playwright-report/
          retention-days: 30